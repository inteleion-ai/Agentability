name: Mark stale issues and PRs

on:
  schedule:
    - cron: "30 1 * * *"   # daily at 01:30 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has
            not had activity in 60 days. It will be closed in 14 days unless
            there is further activity. Thank you for your contributions!
          stale-pr-message: >
            This pull request has been automatically marked as stale because
            it has not had activity in 30 days. It will be closed in 7 days
            unless there is further activity.
          close-issue-message: >
            This issue was closed because it has been stale for 14 days
            with no activity. Please re-open if this is still relevant.
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-issue-close: 14
          days-before-pr-close: 7
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,security,good first issue,help wanted"
          exempt-pr-labels: "pinned,security"
